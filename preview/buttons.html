<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--paper);font-family:var(--font-sans);}
  .row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
  .btn{font-family:var(--font-sans);font-size:13px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:14px 24px;border:1px solid transparent;cursor:pointer;transition:all 120ms cubic-bezier(0.2,0,0,1);}
  .primary{background:var(--ink);color:var(--paper);}
  .primary:hover{background:#1a2d52;}
  .secondary{background:transparent;color:var(--ink);border-color:var(--ink);}
  .secondary:hover{background:var(--ink-04);}
  .gold{background:var(--gold);color:var(--ink);}
  .gold:hover{background:var(--gold-soft);}
  .ghost{background:transparent;color:var(--ink);border:none;text-decoration:underline;text-decoration-color:var(--gold);text-underline-offset:4px;text-transform:none;letter-spacing:0;font-family:var(--font-serif);font-size:14px;font-weight:400;padding:8px 0;}
</style></head>
<body>
  <div class="row">
    <button class="btn primary">Apply for Membership</button>
    <button class="btn secondary">View Calendar</button>
    <button class="btn gold">Sponsor</button>
    <a class="btn ghost">Read more →</a>
  </div>
</body></html>
