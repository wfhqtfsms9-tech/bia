<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--paper);}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{aspect-ratio:1.6/1;border:1px solid var(--ink-12);}
  .name{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:0.06em;color:var(--fg1);text-transform:uppercase;}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:-0.01em;}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#F5F0E6"></div><div class="name">Paper</div><div class="hex">#F5F0E6</div></div>
    <div class="sw"><div class="chip" style="background:#EDE6D6"></div><div class="name">Bone</div><div class="hex">#EDE6D6</div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="name">White</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:#E5DFD2"></div><div class="name">N100</div><div class="hex">#E5DFD2</div></div>
    <div class="sw"><div class="chip" style="background:#CFC8B8"></div><div class="name">N200</div><div class="hex">#CFC8B8</div></div>
    <div class="sw"><div class="chip" style="background:#8A8576"></div><div class="name">N400</div><div class="hex">#8A8576</div></div>
    <div class="sw"><div class="chip" style="background:#67635A"></div><div class="name">N500</div><div class="hex">#67635A</div></div>
    <div class="sw"><div class="chip" style="background:#4B473F"></div><div class="name">N600</div><div class="hex">#4B473F</div></div>
    <div class="sw"><div class="chip" style="background:#33302A"></div><div class="name">N700</div><div class="hex">#33302A</div></div>
    <div class="sw"><div class="chip" style="background:#0F0E0C"></div><div class="name">N900</div><div class="hex">#0F0E0C</div></div>
  </div>
</body></html>
