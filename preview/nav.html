<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--paper);}
  nav{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--ink);background:rgba(245,240,230,.88);backdrop-filter:blur(12px);}
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand .b{font-family:var(--font-display);font-size:22px;font-weight:500;letter-spacing:-0.5px;color:var(--ink);}
  .brand .sm{font-family:var(--font-sans);font-size:9px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg2);}
  ul{display:flex;gap:32px;list-style:none;margin:0;padding:0;}
  ul a{font-family:var(--font-sans);font-size:13px;font-weight:500;letter-spacing:0.06em;color:var(--ink);text-decoration:none;text-transform:uppercase;}
  ul a:hover{color:var(--gold-deep);}
  .cta{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;background:var(--ink);color:var(--paper);padding:10px 20px;border:none;cursor:pointer;}
</style></head>
<body>
  <nav>
    <div class="brand"><span class="b">BIA</span><span style="width:1px;height:18px;background:var(--ink);"></span><span class="sm">Finance Club</span></div>
    <ul>
      <li><a>About</a></li>
      <li><a>Calendar</a></li>
      <li><a>Research</a></li>
      <li><a>Membership</a></li>
    </ul>
    <button class="cta">Apply</button>
  </nav>
</body></html>
