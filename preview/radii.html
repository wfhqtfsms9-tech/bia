<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--paper);}
  .row{display:flex;gap:32px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;gap:8px;align-items:center;}
  .box{width:96px;height:64px;background:var(--paper);border:1px solid var(--ink);}
  .lbl{font-family:var(--font-sans);font-size:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg2);}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--fg3);}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:0"></div><div class="lbl">R0 · Default</div><div class="v">0</div></div>
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="lbl">R1 · Pills</div><div class="v">2px</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">R2 · Large</div><div class="v">4px</div></div>
  </div>
</body></html>
