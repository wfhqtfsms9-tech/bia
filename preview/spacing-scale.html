<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--paper);}
  .row{display:flex;align-items:flex-end;gap:16px;height:140px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .blk{background:var(--ink);}
  .lbl{font-family:var(--font-sans);font-size:10px;font-weight:600;letter-spacing:0.06em;color:var(--fg2);text-transform:uppercase;}
  .px{font-family:var(--font-mono);font-size:9px;color:var(--fg3);}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="blk" style="width:4px;height:4px;"></div><div class="lbl">1</div><div class="px">4</div></div>
    <div class="item"><div class="blk" style="width:8px;height:8px;"></div><div class="lbl">2</div><div class="px">8</div></div>
    <div class="item"><div class="blk" style="width:12px;height:12px;"></div><div class="lbl">3</div><div class="px">12</div></div>
    <div class="item"><div class="blk" style="width:16px;height:16px;"></div><div class="lbl">4</div><div class="px">16</div></div>
    <div class="item"><div class="blk" style="width:24px;height:24px;"></div><div class="lbl">5</div><div class="px">24</div></div>
    <div class="item"><div class="blk" style="width:32px;height:32px;"></div><div class="lbl">6</div><div class="px">32</div></div>
    <div class="item"><div class="blk" style="width:48px;height:48px;"></div><div class="lbl">7</div><div class="px">48</div></div>
    <div class="item"><div class="blk" style="width:64px;height:64px;"></div><div class="lbl">8</div><div class="px">64</div></div>
    <div class="item"><div class="blk" style="width:96px;height:96px;"></div><div class="lbl">9</div><div class="px">96</div></div>
  </div>
</body></html>
