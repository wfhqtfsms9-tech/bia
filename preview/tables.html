<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--paper);}
  table{font-family:var(--font-serif);font-size:14px;border-collapse:collapse;width:100%;}
  th{font-family:var(--font-sans);font-size:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;text-align:left;padding:10px 0;border-bottom:1px solid var(--ink);color:var(--fg2);}
  td{padding:10px 0;border-bottom:1px solid var(--ink-12);}
  td.num,th.num{font-family:var(--font-mono);font-variant-numeric:tabular-nums;text-align:right;letter-spacing:-0.01em;}
  .up{color:#2F5240;}
  .dn{color:#7A2A2A;}
</style></head>
<body>
  <table>
    <thead><tr><th>Index</th><th class="num">Last</th><th class="num">Change</th><th class="num">YTD</th></tr></thead>
    <tbody>
      <tr><td>S&amp;P 500</td><td class="num">4,872.31</td><td class="num up">+0.42%</td><td class="num up">+8.7%</td></tr>
      <tr><td>Dow Jones</td><td class="num">38,215.50</td><td class="num up">+0.18%</td><td class="num up">+3.2%</td></tr>
      <tr><td>Nasdaq</td><td class="num">15,712.04</td><td class="num dn">−0.31%</td><td class="num up">+11.4%</td></tr>
      <tr><td>Russell 2000</td><td class="num">2,031.75</td><td class="num up">+0.74%</td><td class="num dn">−1.8%</td></tr>
    </tbody>
  </table>
</body></html>
