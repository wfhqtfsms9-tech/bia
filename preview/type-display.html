<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--paper);}
  .row{display:flex;align-items:baseline;gap:24px;border-bottom:1px solid var(--ink-12);padding:12px 0;}
  .row:last-child{border-bottom:none;}
  .label{font-family:var(--font-sans);font-size:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg2);width:80px;flex-shrink:0;}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg3);margin-left:auto;letter-spacing:-0.01em;}
</style></head>
<body>
  <div class="row"><span class="label">Display</span><span style="font-family:var(--font-display);font-size:48px;font-weight:500;letter-spacing:-0.025em;color:var(--ink);line-height:1;">A society for markets.</span><span class="meta">Bodoni Moda · 500 · 84/56px</span></div>
  <div class="row"><span class="label">Italic</span><span style="font-family:var(--font-display);font-style:italic;font-size:40px;font-weight:400;color:var(--ink);line-height:1;">Markets in review.</span><span class="meta">Bodoni Moda · italic 400</span></div>
</body></html>
