<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--paper);}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{aspect-ratio:1.6/1;border:1px solid var(--ink-12);}
  .name{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:0.06em;color:var(--fg1);text-transform:uppercase;}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg3);letter-spacing:-0.01em;}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#0E1E3A"></div><div class="name">Ink</div><div class="hex">#0E1E3A</div></div>
    <div class="sw"><div class="chip" style="background:#08152D"></div><div class="name">Ink Deep</div><div class="hex">#08152D</div></div>
    <div class="sw"><div class="chip" style="background:#1A2D52"></div><div class="name">Ink Soft</div><div class="hex">#1A2D52</div></div>
    <div class="sw"><div class="chip" style="background:#A8884A"></div><div class="name">Gold</div><div class="hex">#A8884A</div></div>
    <div class="sw"><div class="chip" style="background:#C4A567"></div><div class="name">Gold Soft</div><div class="hex">#C4A567</div></div>
  </div>
</body></html>
