<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--paper);}
  .row{display:flex;gap:24px;align-items:flex-start;}
  .field{display:flex;flex-direction:column;gap:6px;flex:1;}
  label{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg2);}
  input,select{font-family:var(--font-serif);font-size:16px;padding:10px 0;border:none;border-bottom:1px solid var(--ink);background:transparent;color:var(--ink);outline:none;}
  input::placeholder{color:var(--fg3);font-style:italic;}
  input:focus{border-bottom-color:var(--gold);border-bottom-width:2px;padding-bottom:9px;}
  .help{font-family:var(--font-serif);font-size:12px;color:var(--fg3);font-style:italic;}
</style></head>
<body>
  <div class="row">
    <div class="field"><label>Full Name</label><input placeholder="Jane Holloway"/></div>
    <div class="field"><label>Email</label><input value="j.holloway@example.com"/><span class="help">Used for member correspondence only.</span></div>
    <div class="field"><label>Affiliation</label><input placeholder="Firm or institution"/></div>
  </div>
</body></html>
