<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--paper);display:flex;gap:32px;align-items:center;justify-content:center;}
  .item{display:flex;flex-direction:column;gap:10px;align-items:center;}
  .lbl{font-family:var(--font-sans);font-size:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg2);}
  .swatch{padding:16px;display:flex;align-items:center;justify-content:center;width:152px;height:152px;}
  .light{background:var(--paper);color:var(--ink);border:1px solid var(--ink-12);}
  .dark{background:var(--ink);color:var(--paper);}
  svg{display:block;width:120px;height:120px;}
  .mark{background:var(--ink);width:80px;height:80px;display:block;}
</style></head>
<body>
  <div class="item">
    <div class="swatch light">
      <svg viewBox="0 0 200 200" fill="none">
        <rect x="6" y="6" width="188" height="188" stroke="currentColor" stroke-width="1.5"/>
        <rect x="14" y="14" width="172" height="172" stroke="currentColor" stroke-width="0.75"/>
        <g font-family="'Bodoni Moda','Bodoni 72','Didot',serif" fill="currentColor" text-anchor="middle">
          <text x="100" y="118" font-size="92" font-weight="500" letter-spacing="-2">BIA</text>
          <text x="100" y="148" font-size="9" font-weight="600" letter-spacing="3">FINANCE CLUB</text>
          <text x="100" y="166" font-size="7" font-weight="400" letter-spacing="2" font-style="italic">EST · MMXIX</text>
        </g>
      </svg>
    </div>
    <div class="lbl">Monogram · Light</div>
  </div>
  <div class="item">
    <div class="swatch dark">
      <svg viewBox="0 0 200 200" fill="none">
        <rect x="6" y="6" width="188" height="188" stroke="#F5F0E6" stroke-width="1.5"/>
        <rect x="14" y="14" width="172" height="172" stroke="#A8884A" stroke-width="0.75"/>
        <g font-family="'Bodoni Moda','Bodoni 72','Didot',serif" fill="#F5F0E6" text-anchor="middle">
          <text x="100" y="118" font-size="92" font-weight="500" letter-spacing="-2">BIA</text>
          <text x="100" y="148" font-size="9" font-weight="600" letter-spacing="3" fill="#A8884A">FINANCE CLUB</text>
          <text x="100" y="166" font-size="7" font-weight="400" letter-spacing="2" font-style="italic" fill="#A8884A">EST · MMXIX</text>
        </g>
      </svg>
    </div>
    <div class="lbl">Monogram · Dark</div>
  </div>
  <div class="item">
    <img src="../assets/mark.svg" class="mark"/>
    <div class="lbl">App Mark</div>
  </div>
</body></html>
