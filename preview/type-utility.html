<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--paper);}
  .row{display:flex;align-items:baseline;gap:20px;padding:10px 0;border-bottom:1px solid var(--ink-12);}
  .row:last-child{border:0;}
  .label{font-family:var(--font-sans);font-size:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg2);width:88px;flex-shrink:0;}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg3);margin-left:auto;letter-spacing:-0.01em;}
</style></head>
<body>
  <div class="row"><span class="label">Body</span><span style="font-family:var(--font-serif);font-size:18px;color:var(--ink);line-height:1.5;">The Club convenes Thursdays. Members come for rigor.</span><span class="meta">Source Serif · 18/30</span></div>
  <div class="row"><span class="label">Eyebrow</span><span style="font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg2);">ESTABLISHED 2019 · NEW YORK</span><span class="meta">Google Sans 600 · 12px</span></div>
  <div class="row"><span class="label">Kicker</span><span style="font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);">MARKETS · COMMENTARY</span><span class="meta">Google Sans 600 gold</span></div>
  <div class="row"><span class="label">Mono</span><span style="font-family:var(--font-mono);font-size:14px;color:var(--ink);letter-spacing:-0.01em;">SPX 4,872.31 +0.42%</span><span class="meta">JetBrains Mono 500</span></div>
  <div class="row"><span class="label">Caption</span><span style="font-family:var(--font-sans);font-size:13px;color:var(--fg3);">Source: Bloomberg, BIA Research</span><span class="meta">Google Sans 400 · 14px</span></div>
</body></html>
