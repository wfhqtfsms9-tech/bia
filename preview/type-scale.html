<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--paper);}
  .row{display:flex;align-items:baseline;gap:20px;padding:10px 0;border-bottom:1px solid var(--ink-12);}
  .row:last-child{border:0;}
  .label{font-family:var(--font-sans);font-size:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg2);width:64px;flex-shrink:0;}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg3);margin-left:auto;letter-spacing:-0.01em;}
</style></head>
<body>
  <div class="row"><span class="label">H1</span><span style="font-family:var(--font-display);font-size:40px;font-weight:500;letter-spacing:-0.02em;line-height:1;color:var(--ink);">Headline One</span><span class="meta">Bodoni 500 · 84px</span></div>
  <div class="row"><span class="label">H2</span><span style="font-family:var(--font-display);font-size:30px;font-weight:500;letter-spacing:-0.015em;color:var(--ink);">Headline Two</span><span class="meta">Bodoni 500 · 44px</span></div>
  <div class="row"><span class="label">H3</span><span style="font-family:var(--font-serif);font-size:22px;font-weight:600;color:var(--ink);">Section Heading</span><span class="meta">Source Serif 600 · 24px</span></div>
  <div class="row"><span class="label">Lede</span><span style="font-family:var(--font-serif);font-size:20px;color:var(--ink);">A confident opening sentence.</span><span class="meta">Source Serif 400 · 24px</span></div>
</body></html>
